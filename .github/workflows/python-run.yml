name: python-run

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: python-run-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MPLBACKEND: Agg
      PYTHON_RUN_INPUT: ${{ vars.PYTHON_RUN_INPUT || '2.7' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run assignment script and capture output
        run: |
          mkdir -p run-logs
          printf '%s\n' "$PYTHON_RUN_INPUT" | timeout 20s python aufgabe.py > run-logs/aufgabe.log 2>&1
          cat run-logs/aufgabe.log

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: python-run-logs
          path: run-logs/*.log
          if-no-files-found: error
